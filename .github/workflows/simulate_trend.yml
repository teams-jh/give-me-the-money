name: Simulate Trend

# daily.yml 완료 직후 자동 실행 (workflow_run 체인)
# workflow_dispatch로 수동 실행도 가능
on:
  workflow_run:
    workflows: ["Daily Update"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      market:
        description: "실행할 마켓 (kr / us / all)"
        required: false
        default: "all"
      n:
        description: "분석할 티커 수 (기본: 전체, 테스트용: 50)"
        required: false
        default: ""

jobs:
  # ── KR 추세 시뮬레이션 ────────────────────────────────────────────────────
  simulate-kr:
    name: "KR 추세 시뮬레이션"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.market == 'kr' ||
        github.event.inputs.market == 'all' ||
        github.event.inputs.market == ''
      ))

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install Node dependencies
        working-directory: server_node
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-nanum

      - name: Install Python dependencies
        run: pip install matplotlib numpy --break-system-packages

      - name: Run simulate_trend (KR)
        run: |
          N_OPT=""
          if [ -n "${{ github.event.inputs.n }}" ]; then
            N_OPT="--n ${{ github.event.inputs.n }}"
          fi
          server_node/node_modules/.bin/tsx scripts/simulate_trend.ts --market kr $N_OPT

      - name: Commit and push (KR)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/kr/trend_sim/

          if git diff --cached --quiet; then
            echo "KR 변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: KR 추세 시뮬레이션 (${TIMESTAMP})"
            git pull --rebase --autostash
            git push
          fi

      - name: Notify Slack (KR)
        if: success()
        env:
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          # 직전 커밋에 추가된 KR PNG만 추출 (이번 실행 산출물)
          PNGS=$(git diff-tree --no-commit-id --name-only -r HEAD -- "src/db/kr/trend_sim/*.png" | paste -sd, -)
          if [ -z "$PNGS" ]; then
            echo "전송할 신규 PNG 없음 — Slack 전송 건너뜀"
          else
            echo "Slack 전송 대상: $PNGS"
            server_node/node_modules/.bin/tsx scripts/notify_slack.ts --files "$PNGS" --market kr
          fi

  # ── US 추세 시뮬레이션 ────────────────────────────────────────────────────
  simulate-us:
    name: "US 추세 시뮬레이션"
    runs-on: ubuntu-latest
    needs: simulate-kr   # KR 완료 후 실행 (git 충돌 방지)
    if: |
      always() && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'workflow_dispatch' && (
          github.event.inputs.market == 'us' ||
          github.event.inputs.market == 'all' ||
          github.event.inputs.market == ''
        ))
      )

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install Node dependencies
        working-directory: server_node
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-nanum

      - name: Install Python dependencies
        run: pip install matplotlib numpy --break-system-packages

      - name: Run simulate_trend (US)
        run: |
          N_OPT=""
          if [ -n "${{ github.event.inputs.n }}" ]; then
            N_OPT="--n ${{ github.event.inputs.n }}"
          fi
          server_node/node_modules/.bin/tsx scripts/simulate_trend.ts --market us $N_OPT

      - name: Commit and push (US)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash   # KR 커밋 반영

          git add src/db/us/trend_sim/

          if git diff --cached --quiet; then
            echo "US 변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: US 추세 시뮬레이션 (${TIMESTAMP})"
            git pull --rebase --autostash
            git push
          fi

      - name: Notify Slack (US)
        if: success()
        env:
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          # 직전 커밋에 추가된 US PNG만 추출 (이번 실행 산출물)
          PNGS=$(git diff-tree --no-commit-id --name-only -r HEAD -- "src/db/us/trend_sim/*.png" | paste -sd, -)
          if [ -z "$PNGS" ]; then
            echo "전송할 신규 PNG 없음 — Slack 전송 건너뜀"
          else
            echo "Slack 전송 대상: $PNGS"
            server_node/node_modules/.bin/tsx scripts/notify_slack.ts --files "$PNGS" --market us
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::추세 시뮬레이션 실패! Actions 로그를 확인하세요."
