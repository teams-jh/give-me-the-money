      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run Russell 1000 update script
        run: npx tsx server_node/scripts/update_russell1000.ts

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/russell1000_tickers.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: Russell 1000 티커 업데이트 (${TIMESTAMP})"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::Russell 1000 업데이트 실패! Actions 로그를 확인하세요."
