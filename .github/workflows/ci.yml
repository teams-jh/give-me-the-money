name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci.yml'
      - 'src/library/shared/**'
      - 'scripts/**'
      - 'server_node/scripts/**'
      - 'vitest.config.ts'
      - 'tsconfig.check.json'
      - 'package.json'
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: "타입 체크 + 유닛 테스트"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # server_node 의존성 설치 (cheerio, adm-zip, iconv-lite 등)
      # 루트 vitest가 server_node/scripts/**/*.ts 를 import할 때 필요
      - name: Install server_node dependencies
        working-directory: server_node
        run: npm ci

      # 전체 프로젝트 tsc는 OOM 발생 → 백엔드/공용 로직만 체크
      - name: Type check (shared + scripts)
        run: npm run typecheck:check

      # 테스트 실패 시 CI 블로킹
      - name: Run tests
        run: npm run test:run

      # 커버리지 임계값(80%) 미달 시 CI 실패
      - name: Coverage report
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
