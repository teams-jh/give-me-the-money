name: CI

# PR 또는 main/develop 푸시 시 자동 실행
on:
  push:
    branches: [main, develop]
    paths:
      - 'src/library/shared/**'
      - 'scripts/**'
      - 'server_node/**'
      - 'vitest.config.ts'
      - 'tsconfig.check.json'
      - 'package.json'
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: "타입 체크 + 유닛 테스트"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 전체 프로젝트 tsc는 OOM 발생 → 백엔드/공용 로직만 체크
      - name: Type check (shared + scripts)
        run: npm run typecheck:check

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
