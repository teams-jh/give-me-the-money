name: Update KR Stock Tickers

on:
  schedule:
    # 매주 토요일 03:00 KST = 금요일 18:00 UTC (미국주식 워크플로우 17:00 UTC 와 겹치지 않게)
    - cron: "0 18 * * 5"

  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "manual trigger"

jobs:
  update-kr-stock:
    name: "Update 코스피200 + 코스닥150"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run KR stock update script
        run: npx tsx server_node/scripts/update_kr_stock.ts

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/metadata/kospi300_tickers.json src/db/metadata/kosdaq200_tickers.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: 국내주식 티커 업데이트 (${TIMESTAMP})"
            git pull --rebase
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::국내주식 티커 업데이트 실패! Actions 로그를 확인하세요."
