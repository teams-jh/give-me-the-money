name: Update FX Rate (USD/KRW)

on:
  schedule:
    # 매주 월~금 09:00 KST = 00:00 UTC
    # 전 거래일 종가 환율을 장 시작 전에 반영
    - cron: "0 0 * * 1-5"

  workflow_dispatch:
    inputs:
      force:
        description: "오늘 이미 업데이트된 파일도 재다운로드 (true/false)"
        required: false
        default: "false"

jobs:
  update-fx-rate:
    name: "Update USD/KRW Exchange Rate"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run FX rate update script
        run: npx tsx server_node/scripts/update_fx_rate.ts ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/fx/USDKRW.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: USD/KRW 환율 업데이트 (${TIMESTAMP})"
            git pull --rebase
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::USD/KRW 환율 업데이트 실패! Actions 로그를 확인하세요."
