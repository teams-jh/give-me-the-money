name: Update US Top 1000 Tickers

on:
  schedule:
    # 매주 월요일 01:00 KST = 일요일 16:00 UTC
    - cron: "0 16 * * 0"

  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "manual trigger"

jobs:
  update-tickers:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run ticker update script
        run: node server_node/scripts/update_us_tickers.js

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/us_top1000_tickers.csv src/db/us_top1000_meta.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: US 시총 상위 1000 티커 업데이트 (${TIMESTAMP})"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::티커 업데이트 실패! Actions 로그를 확인하세요."
