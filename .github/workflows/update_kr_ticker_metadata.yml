name: Update KR Ticker Metadata

on:
  # 국내 티커 병합 워크플로우 완료 후 자동 실행
  workflow_run:
    workflows: ["Merge KR Tickers"]
    types: [completed]

  workflow_dispatch:
    inputs:
      force:
        description: "오늘 이미 다운로드된 파일도 재다운로드 (true/false)"
        required: false
        default: "false"
      ticker:
        description: "단일 종목만 처리 (예: 005930.KS) — 비워두면 전체"
        required: false
        default: ""

jobs:
  update-kr-metadata:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run metadata update (single ticker)
        if: ${{ github.event.inputs.ticker != '' }}
        run: npx tsx server_node/scripts/update_ticker_metadata.ts --market kr --ticker ${{ github.event.inputs.ticker }} ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Run metadata update (all tickers)
        if: ${{ github.event.inputs.ticker == '' || github.event_name == 'workflow_run' }}
        run: npx tsx server_node/scripts/update_ticker_metadata.ts --market kr ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/kr_tickers/ src/db/metadata/all_kr_tickers.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: 국내 티커 메타데이터 업데이트 ${COUNT}개 (${TIMESTAMP})"
            git pull --rebase
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::국내 티커 메타데이터 업데이트 실패! Actions 로그를 확인하세요."
