name: Update Nasdaq 100 Tickers

on:
  schedule:
    # 매주 토요일 02:00 KST = 금요일 17:00 UTC
    # (Invesco ETF는 전일 기준으로 업데이트되므로 주말 장 마감 후 실행)
    - cron: "0 17 * * 5"

  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "manual trigger"

jobs:
  update-nasdaq100:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run Nasdaq 100 update script
        run: npx tsx server_node/scripts/update_nasdaq100.ts

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/nasdaq100_tickers.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: Nasdaq 100 티커 업데이트 (${TIMESTAMP})"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::Nasdaq 100 업데이트 실패! Actions 로그를 확인하세요."
