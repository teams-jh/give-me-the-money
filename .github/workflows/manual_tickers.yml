name: Manual Ticker Management

# 수동 관심 종목 추가·제거·목록 조회 (KR / US 공용)
# 실행 후 자동으로 all_{market}_tickers.json 까지 갱신하고 커밋

on:
  workflow_dispatch:
    inputs:
      market:
        description: "마켓 (kr / us)"
        required: true
        type: choice
        options:
          - kr
          - us
      command:
        description: "명령 (add / remove / list)"
        required: true
        type: choice
        options:
          - add
          - remove
          - list
      ticker:
        description: "종목 코드 (add·remove 시 필수, KR 예: 352820.KS / US 예: AAPL)"
        required: false
        default: ""
      name:
        description: "종목명 (add 시 선택, 예: 하이브 / Apple)"
        required: false
        default: ""

jobs:
  manage-manual-tickers:
    name: "[${{ github.event.inputs.market }}] 수동 종목 ${{ github.event.inputs.command }}"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run update_manual_tickers (add)
        if: ${{ github.event.inputs.command == 'add' }}
        working-directory: server_node
        run: |
          ARGS="--market ${{ github.event.inputs.market }} --ticker ${{ github.event.inputs.ticker }}"
          if [ -n "${{ github.event.inputs.name }}" ]; then
            ARGS="$ARGS --name ${{ github.event.inputs.name }}"
          fi
          npx tsx scripts/fetch/update_manual_tickers.ts add $ARGS

      - name: Run update_manual_tickers (remove)
        if: ${{ github.event.inputs.command == 'remove' }}
        working-directory: server_node
        run: |
          npx tsx scripts/fetch/update_manual_tickers.ts \
            --market ${{ github.event.inputs.market }} \
            remove --ticker ${{ github.event.inputs.ticker }}

      - name: Run update_manual_tickers (list)
        if: ${{ github.event.inputs.command == 'list' }}
        working-directory: server_node
        run: |
          npx tsx scripts/fetch/update_manual_tickers.ts \
            --market ${{ github.event.inputs.market }} \
            list

      - name: Merge KR tickers
        if: ${{ (github.event.inputs.command == 'add' || github.event.inputs.command == 'remove') && github.event.inputs.market == 'kr' }}
        working-directory: server_node
        run: npx tsx scripts/merge/merge_kr_tickers.ts

      - name: Merge US tickers
        if: ${{ (github.event.inputs.command == 'add' || github.event.inputs.command == 'remove') && github.event.inputs.market == 'us' }}
        working-directory: server_node
        run: npx tsx scripts/merge/merge_us_tickers.ts

      - name: Commit and push
        if: ${{ github.event.inputs.command == 'add' || github.event.inputs.command == 'remove' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MARKET="${{ github.event.inputs.market }}"
          git add src/db/stock_market_index/manual_${MARKET}_tickers.json \
                  src/db/metadata/all_${MARKET}_tickers.json

          if git diff --cached --quiet; then
            echo "변경 없음 (이미 등록된 종목이거나 미등록 종목 제거)"
          else
            TICKER="${{ github.event.inputs.ticker }}"
            NAME="${{ github.event.inputs.name }}"
            CMD="${{ github.event.inputs.command }}"
            LABEL="${TICKER}${NAME:+ (${NAME})}"
            git commit -m "data: manual_${MARKET}_tickers ${CMD} ${LABEL}"
            git pull --rebase --autostash
            git push
          fi
