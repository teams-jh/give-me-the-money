name: Merge KR Tickers

on:
  # KR Stock 업데이트 워크플로우 완료 후 자동 실행
  workflow_run:
    workflows: ["Update KR Stock Tickers"]
    types: [completed]

  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "manual trigger"

jobs:
  merge:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run merge script
        run: npx tsx server_node/scripts/merge_kr_tickers.ts

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/metadata/all_kr_tickers.json

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: 국내 티커 병합 업데이트 (${TIMESTAMP})"
            git pull --rebase
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::국내 티커 병합 실패! Actions 로그를 확인하세요."
