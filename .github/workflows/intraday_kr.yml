name: Intraday KR

# KR 장 시간: 09:00~15:30 KST = 00:00~06:30 UTC
# 정각 기준: 00:00~06:00 UTC (7회/일), 15:30 마감 전까지 커버
# 첫 번째 실행(00:00 UTC = 09:00 KST)은 오늘 첫 실행이므로
#   isUpdatedToday=false → 풀 다운로드 발생 가능
#   daily.yml(07:00 UTC 전날 데이터)과 겹치지 않음
on:
  schedule:
    - cron: "0 0,1,2,3,4,5,6 * * 1-5"   # 월~금 00:00~06:00 UTC (KST 09:00~15:00)
  workflow_dispatch:
    inputs:
      force:
        description: "강제 재다운로드 (true/false)"
        required: false
        default: "false"

jobs:
  intraday-kr:
    name: "KR 장중 업데이트"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Update KR ticker metadata (오늘 OHLC 갱신)
        working-directory: server_node
        run: npx tsx scripts/fetch/update_ticker_metadata.ts --market kr ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Analyze KR signals
        run: server_node/node_modules/.bin/tsx scripts/analyze_signals.ts --market kr

      - name: Commit and push (KR intraday)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/kr/tickers/ \
                  src/db/kr/signals/ \
                  src/db/metadata/all_kr_tickers.json

          if git diff --cached --quiet; then
            echo "KR 변경 없음 — 커밋 건너뜀"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: KR 장중 업데이트 (${TIMESTAMP})"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "push 실패 (${i}회) — 재시도..."
              sleep 5
            done
          fi
        if: failure()
        run: echo "::error::KR 장중 업데이트 실패! Actions 로그를 확인하세요."
