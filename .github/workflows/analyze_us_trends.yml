name: Analyze US Trends

on:
  workflow_run:
    workflows: ["Update US Ticker Metadata"]
    types: [completed]

  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "manual trigger"

jobs:
  analyze:
    name: "n=${{ matrix.n }} / ${{ matrix.period }}"
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        n:      [100, 500, 1000]
        period: ["3m", "1y", "2y", "3y"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server_node/package-lock.json

      - name: Install dependencies
        working-directory: server_node
        run: npm ci

      - name: Run analyze_trends
        run: npx tsx server_node/scripts/analyze_trends.ts --market us -n ${{ matrix.n }} --period ${{ matrix.period }}

      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: us_trend_${{ matrix.n }}_${{ matrix.period }}
          path: src/db/us_trend/trend_${{ matrix.n }}_${{ matrix.period }}.json
          retention-days: 1

  commit:
    name: "Commit all trend files"
    runs-on: ubuntu-latest
    needs: analyze

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: src/db/us_trend/
          merge-multiple: true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/db/us_trend/

          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "data: 미국 추세 분석 결과 업데이트 ${COUNT}개 파일 (${TIMESTAMP})"
            git pull --rebase
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::미국 추세 분석 커밋 실패! Actions 로그를 확인하세요."
